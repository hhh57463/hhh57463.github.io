<script language="javascript">
	function input_Text() {
		var ArmyKinds = document.getElementById("btn").options[document.getElementById("btn").selectedIndex].value;

		if (ArmyKinds == "0") {
			alert("군별을 선택해 주십시오.");
		}
		if (document.getElementById("test").value == 0) {
			alert("날짜 입력이 잘못 되었습니다.");
		}
		else if (ArmyKinds != "0" && document.getElementById("test").value != 0) {
			var checkdate = document.getElementById("test").value;
		}
		var Today = new Date();
		var OriginDatstr = "2017-01-03";
		var ShortDay = Today.getFullYear() + "-" + (Today.getMonth() + 1) + "-" + Today.getDate();
		var arr1 = checkdate.split('-');
		var arr2 = ShortDay.split('-');
		var Originarr = OriginDatstr.split('-');
		var dat1 = new Date(arr1[0], arr1[1], arr1[2]);
		var dat2 = new Date(arr2[0], arr2[1], arr2[2]);
		var finaldat = new Date(arr1[0], arr1[1], arr1[2]);
		var easydat = finaldat.getFullYear() + "-" + finaldat.getMonth() + "-" + finaldat.getDate();
		var OriginDat = new Date(Originarr[0], Originarr[1], Originarr[2]);
		// var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 9) + "-" + (finaldat.getDate() - 1);
		// var arr3 = checkfinal.split('-');
		// var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
		var years = arr1[0];
		// 복무기간 현재 1년9개월 / 2020년 1년 6개월
		var diff = dat1 - dat2;
		var currDay = 24 * 60 * 60 * 1000;                              // 시 * 분 * 초 * 밀리세컨
		var currMonth = currDay * 30;                                   // 월 만듬
		var currYear = currMonth * 12;                                  // 년 만듬
		// var finaldiff = dat3 - dat2;
		var mindiff = dat1 - OriginDat;
		var minDay = 24 * 60 * 60 * 1000;
		var minMon = minDay * 30;
		var minYear = minMon * 12;
		var minusDay = (parseInt(mindiff / minDay)) / 14;
		var finalminDay = Math.floor(minusDay);
		var finalday = 638 - finalminDay;
		var yearmogs = parseInt(finalday / 365);
		var yearmogsnamer = parseInt(finalday % 365);
		var monthmogs = parseInt(yearmogsnamer / 30);
		var monthmogsnamer = parseInt(yearmogsnamer % 30);
		var daymogs  = parseInt(monthmogsnamer / 7);
		var daynamer = parseInt(monthmogsnamer % 7);
		var resutlday = parseInt(daymogs + daynamer) + 2;
		var persent = Math.floor(((parseInt(diff / currDay) * 100) / finalday) * -1);
		// var resultdat = new Date((finaldat.getFullYear() + yearmogs), (finaldat.getMonth() + monthmogs), (finaldat.getDate() + resultday));
		// var printfinaldat = new Date(finaldat.getFullYear() + yearmogs) + "-" + (finaldat.getMonth() + monthmogs) + "-" + (finaldat.getDate() + resultday);
		
		// document.write("전역일 : " + printfinaldat + "일<br/>");
	

		document.write("군생활이 : " + finalminDay +" 일 줄었습니다.<br/>");
		document.write("군생활을 : " + finalday +" 일 동안 하십니다.<br/>");

		document.write("* 오늘 날짜 : " + ShortDay + "<br/>");
		document.write("* 입대 날짜 : " + easydat + "<br/>");
		if(parseInt(diff/currDay)<0)
		{
		document.write("* 군생활 한 날짜 : " + parseInt(diff / currDay) * -1 + " 일 (총 " + persent + "% 하셨습니다.)<br/>");
		}
		else if(parseInt(diff/currDay)>0)
		{
			document.write("* 입대 : " + parseInt(diff / currDay) + " 일 전<br/>");
		}

		if (ArmyKinds == "1") {                                                                                         //육군
			if (2020 > parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + yearmogs) + "-" + (finaldat.getMonth() + monthmogs) + "-" + (finaldat.getDate() + resutlday);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 육군 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
			else if (2020 <= parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 6) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 육군 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
		}
		if (ArmyKinds == "2") {                                                                                             //해군
			if (2020 > parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 11) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 해군 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
			else if (2020 <= parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 8) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 해군 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
		}                                                                                                                   //공군
		if (ArmyKinds == "3") {
			if (2020 > parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 2) + "-" + finaldat.getMonth() + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 공군 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
			else if (2020 <= parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 10) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 공군 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
		}
		if (ArmyKinds == "4") {                                                                                                 //의경
			if (2020 > parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 9) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 의경 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
			else if (2020 <= parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 6) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 의경 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
		}
		if (ArmyKinds == "5") {                                                                                                     //사회복무요원
			if (2020 > parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 2) + "-" + (finaldat.getMonth() + 1) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 사회복무요원 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
			else if (2020 <= parseInt(years)) {
				var checkfinal = (finaldat.getFullYear() + 1) + "-" + (finaldat.getMonth() + 9) + "-" + (finaldat.getDate() - 1);
				var arr3 = checkfinal.split('-');
				var dat3 = new Date(arr3[0], arr3[1], arr3[2]);
				var finaldiff = dat3 - dat2;
				document.write("* 군별 : 사회복무요원 <br/>");
				document.write("* 전역 일 : " + checkfinal + " 일<br/>");
				document.write("* 전역까지 남은 일 : " + parseInt(finaldiff / currDay) + " 일<br/>");
			}
		}
	}
	function printTime() {
		var clock = document.getElementById("MillitaryTimer");
		var now = new Date();
		var nowTime = now.getFullYear() + "년" + (now.getMonth() + 1) + "월" + now.getDate() + "일";
		clock.innerHTML = nowTime;
		setTimeout("printTime()", 1000);                             //1초마다 지연됨(1초마다 실행)   
	}
	window.onload = function () {
		printTime();
	}
</script>
